<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sonidos de Aves</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #eef7f2;
      margin: 0;
    }

    /* 🔥 CONTENEDOR DEL BANNER */
    .banner-container {
      padding: 15px; /* margen respecto a bordes */
    }

    /* 🔥 BANNER SIN RECORTE */
    .banner {
      width: 100%;
      max-width: 1200px; /* respeta tamaño original */
      height: auto; /* mantiene proporción 1200x300 */
      display: block;
      margin: 0 auto; /* centrado */
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      transition: background-color 0.3s;
    }

    .active {
      background-color: #b0b0b0;
    }

    button {
      padding: 8px 15px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background-color: green;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: darkgreen;
    }

    /* 🔥 IMÁGENES CUADRADAS */
    img.ave {
      width: 50%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      margin: 10px auto;
    }

  </style>
</head>

<body>

<!-- 🔥 BANNER CON ESPACIADO -->
<div class="banner-container">
  <img src="imagenes/Banner_Auquisamana.jpg" class="banner">
</div>

<div class="grid">

  <div class="card" id="card9">
    <img src="imagenes/Colibri_cometa_Sappho_sparganurus.jpg" class="ave">
    <button onclick="toggleAudio('audio9','card9')">Escuchar</button>
    <audio id="audio9" src="audios/Colibri_cometa_Sappho_sparganurus_v1.mp3"></audio>
  </div>

  <div class="card" id="card10">
    <img src="imagenes/Colibri_gigante_Patagona_gigas.jpg" class="ave">
    <button onclick="toggleAudio('audio10','card10')">Escuchar</button>
    <audio id="audio10" src="audios/Colibri_gigante_Patagona_gigas_v1.mp3"></audio>
  </div>

  <div class="card" id="card4">
    <img src="imagenes/Colibri_rutilante_Colibri_coruscans.jpg" class="ave">
    <button onclick="toggleAudio('audio4','card4')">Escuchar</button>
    <audio id="audio4" src="audios/Colibri_rutilante_Colibri_coruscans_v2.mp3"></audio>
  </div>

  <div class="card" id="card5">
    <img src="imagenes/Cortarramas_Phytotoma_rutila.jpg" class="ave">
    <button onclick="toggleAudio('audio5','card5')">Escuchar</button>
    <audio id="audio5" src="audios/Cortarramas_Phytotoma_rutila_v1.mp3"></audio>
  </div>

  <div class="card" id="card6">
    <img src="imagenes/Killi_killi_Falco_sparverius.jpg" class="ave">
    <button onclick="toggleAudio('audio6','card6')">Escuchar</button>
    <audio id="audio6" src="audios/Killi_killi_Falco_sparverius_v2.mp3"></audio>
  </div>

  <div class="card" id="card12">
    <img src="imagenes/Pinchaflor_carbonero_Diglossa_carbonaria.jpg" class="ave">
    <button onclick="toggleAudio('audio12','card12')">Escuchar</button>
    <audio id="audio12" src="audios/Pinchaflor_carbonero_Diglossa_carbonaria_v2.mp3"></audio>
  </div>

</div>

<script>

let currentAudio = null;
let currentCard = null;

function toggleAudio(audioId, cardId) {
  let audio = document.getElementById(audioId);
  let card = document.getElementById(cardId);

  if (currentAudio === audio && !audio.paused) {
    audio.pause();
    audio.currentTime = 0;
    card.classList.remove("active");
    currentAudio = null;
    currentCard = null;
    return;
  }

  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  if (currentCard) {
    currentCard.classList.remove("active");
  }

  audio.play();
  card.classList.add("active");

  currentAudio = audio;
  currentCard = card;

  audio.onended = function() {
    card.classList.remove("active");
    currentAudio = null;
    currentCard = null;
  };
}

</script>

</body>
</html>
